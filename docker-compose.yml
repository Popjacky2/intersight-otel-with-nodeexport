services:
  intersight-otel:
    image: ghcr.io/cgascoig/intersight-otel:v0.2.0
    command:
      - "/target/release/intersight_otel"
      - "-c"
      - "/etc/intersight-otel/intersight-otel.toml"
    environment:
      - RUST_LOG=info
      - intersight_otel_key_file=/etc/intersight-otel-key/intersight.pem
      - intersight_otel_key_id=${INTERSIGHT_KEY_ID}
    volumes:
      - ./config/intersight-otel.toml:/etc/intersight-otel/intersight-otel.toml:ro
      - ./secrets/intersight.pem:/etc/intersight-otel-key/intersight.pem:ro
    networks:
      - otel-net  
    depends_on:
      - otel-collector
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/conf/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/conf/otel-collector-config.yaml:ro
    ports:
      - "55679:55679"   # ZPages
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14250:14250"   # Jaeger gRPC
      - "14268:14268"   # Jaeger HTTP
      - "9411:9411"     # Zipkin
      - "8888:8888"     # Metrics
      - "2112:2112"     # Prometheus exporter
    networks:
      - otel-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    user: root
    command:
      - "--log.level=info"
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "0.0.0.0:9090:9090"
    depends_on:
      - otel-collector
      - node-exporter
    networks:
      - otel-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - otel-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/dashboards-provider:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - prometheus
    networks:
      - otel-net
    restart: unless-stopped

networks:
  otel-net:
    driver: bridge

volumes:
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /you/own/path
