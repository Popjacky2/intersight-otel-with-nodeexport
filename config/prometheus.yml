global:
  scrape_interval: 60s

scrape_configs:
  - job_name: 'otel-collector'
    scrape_interval: 60s
    static_configs:
      - targets: ['otel-collector:2112']

  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['hostname.ip.address.baremetal1:9100']
        labels:
          hostname: 'hostname1'
      - targets: ['hostname.ip.address.baremetal2:9100']
        labels:
          hostname: 'ubuntu1'
          
