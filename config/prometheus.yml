global:
  scrape_interval: 60s

scrape_configs:
  - job_name: 'otel-collector'
    scrape_interval: 60s
    static_configs:
      - targets: ['otel-collector:2112']

  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          hostname: 'node-exporter'
      - targets: ['10.10.10.60:9100']
        labels:
          hostname: 'ubuntu'
          
